# -----------------------------------------------------
# Window rules (Hyprland 0.55+ : règle et conditions séparées par des ESPACES, pas de virgule)
# -----------------------------------------------------

# Fenêtres flottantes par nature (dialogues, utilitaires)
windowrule = float class:^(pavucontrol)$
windowrule = float class:^(nm-connection-editor)$
windowrule = float class:^(blueman-manager)$
windowrule = float class:^(org.gnome.Calculator)$
windowrule = float class:^(nwg-displays)$
windowrule = float title:^(Open File)$
windowrule = float title:^(Save File)$
windowrule = float title:^(Choose Files)$

# Picture-in-Picture : flottant, épinglé, suit entre les workspaces
windowrule = float title:^(Picture-in-Picture)$
windowrule = pin title:^(Picture-in-Picture)$

# Partage d'écran (sélecteur xdg-desktop-portal)
windowrule = float class:^(xdg-desktop-portal-gtk)$

# Note anti-veille pendant le jeu : la windowrule `idle_inhibit fullscreen` est
# cassée sur Hyprland 0.55 (acceptée mais sans effet, inhibitingIdle reste false).
# À la place, le démon Rust scripts/idle-inhibit/ écoute le socket2 de Hyprland
# et active le Keep Awake de Noctalia dès qu'une fenêtre est en plein écran (mode
# 1 ou 2 — gamescope = 2). Couvre pad/HOTAS sans gamemode. Voir le mémo dotfiles.
