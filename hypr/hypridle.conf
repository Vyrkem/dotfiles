# -----------------------------------------------------
# hypridle — verrouillage / extinction sur inactivité
# Verrouille via le lockscreen de Noctalia.
# -----------------------------------------------------

general {
    lock_cmd = qs -c noctalia-shell ipc call lockScreen lock
    before_sleep_cmd = qs -c noctalia-shell ipc call lockScreen lock
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300                                   # 5 min
    on-timeout = qs -c noctalia-shell ipc call lockScreen lock
}

listener {
    timeout = 360                                   # 6 min
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 900                                   # 15 min
    on-timeout = systemctl suspend
}
