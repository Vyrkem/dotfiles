# -----------------------------------------------------
# Raccourcis (repris de ton ML4W, remappés vers Noctalia)
# -----------------------------------------------------

$mainMod = SUPER

# Raccourci pour appeler l'IPC de Noctalia
$noctalia = qs -c noctalia-shell ipc call

# --- Applications ---
bind = $mainMod, RETURN, exec, ghostty                # Terminal
bind = $mainMod, B, exec, brave                       # Navigateur
bind = $mainMod, E, exec, nautilus                    # Gestionnaire de fichiers

# --- Noctalia (shell : launcher, panneaux, etc.) ---
bind = $mainMod, D, exec, $noctalia launcher toggle           # Lanceur d'applications
bind = $mainMod CTRL, RETURN, exec, $noctalia launcher toggle # Lanceur (ancien raccourci)
bind = $mainMod, V, exec, $noctalia launcher clipboard        # Historique presse-papiers
bind = $mainMod, PERIOD, exec, $noctalia launcher emoji       # Sélecteur d'emoji
bind = $mainMod CTRL, S, exec, $noctalia controlCenter toggle # Control Center (ex-sidebar ML4W)
bind = $mainMod CTRL, C, exec, $noctalia calendar toggle      # Calendrier
bind = $mainMod, N, exec, $noctalia notifications toggleHistory # Historique des notifications
bind = $mainMod CTRL, P, exec, $noctalia sessionMenu toggle   # Menu d'alimentation
bind = $mainMod CTRL, L, exec, $noctalia lockScreen lock      # Verrouiller l'écran
bind = $mainMod SHIFT, M, exec, $noctalia darkMode toggle     # Bascule clair / sombre
bind = $mainMod CTRL, COMMA, exec, $noctalia settings toggle  # Réglages Noctalia

# --- Fond d'écran (géré par Noctalia) ---
bind = $mainMod SHIFT, W, exec, $noctalia wallpaper random    # Fond d'écran aléatoire
bind = $mainMod CTRL, W, exec, $noctalia wallpaper toggle     # Sélecteur de fond d'écran

# --- Captures d'écran (grim + slurp) ---
bind = $mainMod, PRINT, exec, grim -g "$(slurp)" - | wl-copy           # Zone -> presse-papiers
bind = $mainMod ALT, F, exec, grim - | wl-copy                        # Plein écran -> presse-papiers
bind = , PRINT, exec, grim -g "$(slurp)" "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"  # Zone -> fichier

# --- Fenêtres ---
bind = $mainMod, Q, killactive                        # Fermer la fenêtre active
bind = $mainMod, F, fullscreen, 0                     # Plein écran
bind = $mainMod, M, fullscreen, 1                     # Maximiser
bind = $mainMod, T, togglefloating                    # Bascule flottant
bind = $mainMod, J, layoutmsg, togglesplit            # Bascule split
bind = $mainMod, G, togglegroup                       # Grouper les fenêtres
bind = $mainMod, K, layoutmsg, swapsplit              # Échanger le split
bind = $mainMod CTRL, R, exec, hyprctl reload         # Recharger Hyprland

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Déplacer / redimensionner à la souris
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Redimensionner au clavier
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, down, resizeactive, 0 100
bind = $mainMod SHIFT, up, resizeactive, 0 -100

# Échanger les fenêtres tuilées
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d

# Cycle de fenêtres
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop

# --- Espaces de travail ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- Touches multimédia (via Noctalia pour l'OSD) ---
bindle = , XF86AudioRaiseVolume, exec, $noctalia volume increase
bindle = , XF86AudioLowerVolume, exec, $noctalia volume decrease
bind = , XF86AudioMute, exec, $noctalia volume muteOutput
bind = , XF86AudioMicMute, exec, $noctalia volume muteInput
bindle = , XF86MonBrightnessUp, exec, $noctalia brightness increase
bindle = , XF86MonBrightnessDown, exec, $noctalia brightness decrease
bind = , XF86AudioPlay, exec, $noctalia media playPause
bind = , XF86AudioPause, exec, $noctalia media pause
bind = , XF86AudioNext, exec, $noctalia media next
bind = , XF86AudioPrev, exec, $noctalia media previous
