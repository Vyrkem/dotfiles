# -----------------------------------------------------
# Config Hyprland — Noctalia
# Bureau : Hyprland (compositeur) + Noctalia (shell)
# -----------------------------------------------------

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf

# -----------------------------------------------------
# Clavier / souris (repris de ton ancienne config)
# -----------------------------------------------------
input {
    kb_layout = us,ca
    kb_variant = ,fr
    kb_options = grp:alt_shift_toggle
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = false
    }
}

# -----------------------------------------------------
# Apparence
# -----------------------------------------------------
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 20
    rounding_power = 2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = windows, 1, 4, easeOutQuint
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, easeOutQuint, slide
}

# -----------------------------------------------------
# Environnement
# -----------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORMTHEME,qt6ct
# Terminal par défaut pour les apps qui lisent $TERMINAL
env = TERMINAL,ghostty

# -----------------------------------------------------
# Autostart
# -----------------------------------------------------
# Propage l'environnement aux services systemd/dbus (portails, etc.)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Agent d'authentification (mots de passe sudo graphiques)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Stockage de l'historique du presse-papiers (backend du clipboard Noctalia)
exec-once = wl-paste --watch cliphist store

# Verrouillage automatique sur inactivité
exec-once = hypridle

# Noctalia — le shell (barre, launcher, notifications, lockscreen…)
exec-once = qs -c noctalia-shell
